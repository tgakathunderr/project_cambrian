name: Build & Release Project Cambrian

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build ${{ matrix.os }} Installer
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libopenblas-dev

      - name: Install Python Dependencies, BIB Brain & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install numpy numba fastapi uvicorn pyinstaller
          pip install git+https://github.com/tgakathunderr/bib.git

      - name: Build Frontend Production Bundle
        run: |
          cd frontend
          npm install
          npm run build

      - name: Compile Frozen Python Backend
        run: |
          pyinstaller cambrian_backend.spec --noconfirm

      - name: Install Electron Build Dependencies
        run: |
          npm install

      - name: Build & Publish Release Executables via Electron-Builder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run dist -- --publish always

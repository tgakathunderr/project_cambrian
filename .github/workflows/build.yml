name: Build & Release Project Cambrian

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build ${{ matrix.os }} Installer
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout BIB Brain Repository
        uses: actions/checkout@v4
        with:
          repository: 'tgakathunderr/bib'
          path: 'bib'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libopenblas-dev fakeroot dpkg

      - name: Install Python Dependencies, BIB Brain & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0.0" numba pyinstaller
          pip install -r backend/requirements.txt
          pip install -e ./bib

      - name: Build Frontend Production Bundle
        run: |
          cd frontend
          npm install
          npm run build

      - name: Compile Frozen Python Backend
        run: |
          pyinstaller cambrian_backend.spec --noconfirm

      - name: Install Electron Build Dependencies
        run: |
          npm install

      - name: Build & Publish Release Executables via Electron-Builder (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --win --publish always

      - name: Build & Publish Release Executables via Electron-Builder (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --mac --publish always

      - name: Build & Publish Release Executables via Electron-Builder (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux AppImage deb --publish always

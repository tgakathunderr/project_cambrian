<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000e07" />
      <stop offset="100%" stop-color="#002111" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dec2a0" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.8" />
    </linearGradient>

    <!-- Trilobite Shell Gradient -->
    <linearGradient id="triloGrad" x1="0" y1="20" x2="100" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dec2a0" />
      <stop offset="35%" stop-color="#f0d3b0" />
      <stop offset="70%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Spine/Rachis Gradient -->
    <linearGradient id="spineGrad" x1="50" y1="20" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dec2a0" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2" />
  
  <!-- Subtle Glowing Inner Circle -->
  <circle cx="50" cy="50" r="41" stroke="#10b981" stroke-width="0.5" stroke-dasharray="3 6" opacity="0.3" />

  <!-- Spine / Rachis -->
  <rect x="48.5" y="24" width="3" height="54" rx="1.5" fill="url(#spineGrad)" opacity="0.9" />

  <!-- Cephalon (Head Shield) -->
  <path d="M 23 35 C 23 18, 77 18, 77 35" stroke="url(#triloGrad)" stroke-width="6.5" stroke-linecap="round" />

  <!-- Thorax Segments -->
  <path d="M 21 44 Q 50 30 79 44" stroke="url(#triloGrad)" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 23 53 Q 50 39 77 53" stroke="url(#triloGrad)" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 27 62 Q 50 49 73 62" stroke="url(#triloGrad)" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 33 71 Q 50 59 67 71" stroke="url(#triloGrad)" stroke-width="4.5" stroke-linecap="round" />

  <!-- Pygidium (Tail) -->
  <path d="M 41 79 Q 50 70 59 79" stroke="url(#triloGrad)" stroke-width="4.5" stroke-linecap="round" />

  <!-- Cybernetic Neural Eye Nodes -->
  <circle cx="39" cy="27" r="1.75" fill="#ffffff" filter="url(#glow)" />
  <circle cx="39" cy="27" r="0.75" fill="#dec2a0" />
  <circle cx="61" cy="27" r="1.75" fill="#ffffff" filter="url(#glow)" />
  <circle cx="61" cy="27" r="0.75" fill="#dec2a0" />
</svg>